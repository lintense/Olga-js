<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
    <title>Olga-JS</title>
    <!--script type="module" src="./libs/olga.js"></script-->
    <script type="text/javascript" src="./libs/nearley.js"></script>
</head>

<body>
    <h1>Olga status</h1>
    <div id="olgaStatus"></div>
    <br>
    <button id="testInstances">Test instances</button>
    <button id="downloadRulesConfig">Download Rules (IIS)</button>
    <button id="downloadKeysMap">Download Keys map (IIS)</button>
    <br> * Download Rules : A complete web.config file to be inserted into your application folder.
    <br> * Download Keys map : A section of a web.config file to be inserted into your root web.config file.

    <script type="module">"use strict";
        // To use something from olga.js, you MUST import it explicitly
        import Olga from './libs/olga.js';

        const olga = new Olga();
        // olga.downloadIIS_Config() // On demand from now!

        //olga.generate("Just respond the word ok no other text");
        olga.test() // Test the connection and streaming, not the content. We want to bypass any caching
        console.log(olga.instances)

        const showStatus = () => {
            document.getElementById("olgaStatus").innerHTML = olga.instances.map(instance =>
                `${instance.name}: Status=${instance.model.api.metrics.status.toString()} (${instance.model.api.metrics.statusText}) Ping=${Math.trunc(instance.model.api.metrics.ping)}ms`).join("<br>")
        }
        showStatus()
        setInterval(showStatus, 1000);
        document.getElementById("testInstances").addEventListener("click", () => olga.test())
        document.getElementById("downloadRulesConfig").addEventListener("click", () => olga.download(olga.extractIISRules(), "web.config"))
        document.getElementById("downloadKeysMap").addEventListener("click", () => olga.download(olga.extractKeysMaps(), "system.webServer.config"))

        //import MiniSort from './libs/MiniSort.js';
        //MiniSort.test()
    </script>
</body>

</html>
